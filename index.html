<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para você 🌹</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

canvas {
    display: block;
}

#text {
    position: absolute;
    bottom: 50px;
    width: 100%;
    font-size: 24px;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="text"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const textEl = document.getElementById("text");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let time = 0;

// ❤️ coração
function heart(t) {
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: 13 * Math.cos(t)
           - 5 * Math.cos(2*t)
           - 2 * Math.cos(3*t)
           - Math.cos(4*t)
    };
}

// 🌹 partículas
for (let i = 0; i < 1200; i++) {
    let t = Math.random() * Math.PI * 2;
    let h = heart(t);

    particles.push({
        x: h.x,
        y: h.y,
        offset: Math.random() * 100
    });
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        let pulse = 1 + 0.1 * Math.sin(time + p.offset);

        let x = canvas.width/2 + p.x * 15 * pulse;
        let y = canvas.height/2 - p.y * 15 * pulse;

        ctx.font = "16px Arial";
        ctx.fillStyle = "red";
        ctx.fillText("🌹", x, y);
    });

    time += 0.05;
}

function animate() {
    draw();
    requestAnimationFrame(animate);
}

animate();

// ✨ mensagem com nome (ALTERE AQUI 👇)
const message = "Theme, Eu te amo mais que tudo, minha mamãe ❤️";

let index = 0;

function typeEffect() {
    if (index < message.length) {
        textEl.innerHTML += message.charAt(index);
        index++;
        setTimeout(typeEffect, 80);
    }
}

// começa depois de 2 segundos
setTimeout(typeEffect, 2000);

</script>

</body>
</html>
